<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <title>Inicio de Sesión</title>

    <style>
        body{
            background: linear-gradient(135deg, #4e73df, #1cc88a);
            font-family: Arial, sans-serif;
        }

        .login-container{
            width: 400px;
            margin: 120px auto;
            padding: 40px;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        .login-title{
            font-size: 24px;
            margin-bottom: 20px;
            color: #4e73df;
        }

        .login-button{
            width: 100%;
        }

    </style>
</h:head>

<h:body>
    <div class="login-container">
        <h:form>
            <p:growl id="mensajes" showDetail="true" />

            <p:panel header="Iniciar Sesión" style="width:400px;margin:auto;margin-top:100px;">

                <p:outputLabel value="Usuario"/>
                <p:inputText value="#{loginBean.username}" required="true" />

                <br/><br/>

                <p:outputLabel value="Contraseña"/>
                <p:password value="#{loginBean.password}" required="true" />

                <br/><br/>

                <p:commandButton value="Ingresar"
                                 action="#{loginBean.login}"
                                 update="mensajes" />

            </p:panel>
        </h:form>
    </div>
</h:body>
</html>
