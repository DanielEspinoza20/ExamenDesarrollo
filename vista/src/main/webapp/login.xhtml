<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <title>Inicio de Sesión</title>

    <style>
        body{
            backgroud: linear-gradient(135deg, #4e73df, #1cc88a);
            font-family: Arial, sans-serif;
        }

        .login-container{
            width: 400px;
            margin: 120px auto;
            padding: 40px;
            backgroud: white;
            border-radius: 10px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        .login-title{
            font-size: 24px;
            margin-bottom: 20px;
            color: #4e73df;
        }

        .login-button{
            width: 100%;
        }

    </style>
</h:head>

<h:body>
    <div class="login-container">
        <h:form>
            <div class="login-title">
                Examen Desarrollo
            </div>

            <p:messages />

            <p:inputText placeholder="Usuario"
                         style="width:100%; margin-botton:15px"/>
            <p:password placeholder="Contraseña"
                        style="width:100%; margin-botton:20px;"/>
            <p:commandButton value="Iniciar Sesión"
                             styleClass="login-button ui-button-sucess"/>
        </h:form>
    </div>
</h:body>
</html>
